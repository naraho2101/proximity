<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encampment Proximity to Amenities</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
      color: #ffffff;
    }
    main { max-width: 900px; margin: 0 auto; }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 14px;
      font-size: 13px;
      font-weight: 500;
    }
    .legend .key { display: flex; align-items: center; gap: 8px; }
    .legend i {
      width: 22px; height: 14px; display: inline-block; border-radius: 2px;
      border: 1px solid rgba(0,0,0,0.25);
    }
    svg { width: 100%; height: auto; display: block; }
    svg text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .tip {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      background: #1C1A18;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 5px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      line-height: 1.6;
      opacity: 0;
      transition: opacity 80ms ease;
      transform: translate(-50%, calc(-100% - 12px));
      box-shadow: 0 3px 14px rgba(0,0,0,0.65);
    }
  </style>
</head>
<body>
  <main>
    <div class="legend" id="legend"></div>
    <svg viewBox="0 0 800 460" id="chart" role="img"
         aria-label="Stacked bar chart showing percentage of encampment reports by walking time to nearest Transit, Park, Food, and Shelter."></svg>
  </main>
  <div class="tip" id="tip"></div>

  <script>
    const SVG_NS = "http://www.w3.org/2000/svg";
    const WALK_M_PER_MIN = 1609.344 / 20;   // 80.467 m/min

    // Same cumulative data as access_curve.html
    const distances = [0, 76.2, 152.4, 304.8, 402.336, 804.672, 1609.344, 3218.688];
    const seriesData = {
      Transit: [0.0, 27.0, 63.9, 91.9, 96.8,  99.8, 100.0, 100.0],
      Park:    [0.0, 14.3, 31.1, 58.1, 73.0,  95.2, 100.0, 100.0],
      Food:    [0.0,  5.0, 13.9, 34.1, 45.6,  76.4,  94.9,  99.8],
      Shelter: [0.0,  0.9,  3.6, 12.1, 17.0,  43.1,  63.4,  84.9],
    };

    // Monotone cubic (Fritsch-Carlson) spline — no overshoot
    function buildSpline(xs, ys) {
      const n = xs.length;
      const delta = [];
      for (let i = 0; i < n - 1; i++)
        delta.push((ys[i+1] - ys[i]) / (xs[i+1] - xs[i]));
      const mt = new Array(n);
      mt[0] = delta[0]; mt[n-1] = delta[n-2];
      for (let i = 1; i < n - 1; i++)
        mt[i] = delta[i-1] * delta[i] <= 0 ? 0 : (delta[i-1] + delta[i]) / 2;
      for (let i = 0; i < n - 1; i++) {
        if (delta[i] === 0) { mt[i] = mt[i+1] = 0; continue; }
        const a = mt[i] / delta[i], b = mt[i+1] / delta[i];
        const tau = a * a + b * b;
        if (tau > 9) { const s = 3 / Math.sqrt(tau); mt[i] = s*a*delta[i]; mt[i+1] = s*b*delta[i]; }
      }
      return { xs, ys, mt };
    }
    function evalSpline({ xs, ys, mt }, x) {
      const n = xs.length;
      if (x <= xs[0]) return ys[0];
      if (x >= xs[n-1]) return ys[n-1];
      let i = 0;
      while (i < n - 2 && x > xs[i+1]) i++;
      const h = xs[i+1] - xs[i], t = (x - xs[i]) / h, t2 = t*t, t3 = t2*t;
      return (2*t3 - 3*t2 + 1)*ys[i] + (t3 - 2*t2 + t)*h*mt[i] + (-2*t3 + 3*t2)*ys[i+1] + (t3 - t2)*h*mt[i+1];
    }

    // Bucket breakpoints
    const BREAKS_M = [3, 10, 20].map(m => m * WALK_M_PER_MIN);
    const BUCKET_LABELS  = ["< 3 min", "3–10 min", "10–20 min", "> 20 min"];
    // Same 4 colours as the heatmap (darkest = closest/most accessible)
    const BUCKET_COLORS  = ["#293B36", "#4F7C6B", "#8FBCAC", "#D7E2DC"];
    const BUCKET_TEXT    = ["#E8EDEC", "#E8EDEC", "#0A1612", "#0A1612"];

    const UTILS = ["Transit", "Park", "Food", "Shelter"];

    // Derive incremental bucket percentages via spline evaluation
    const buckets = {};
    UTILS.forEach(u => {
      const spl = buildSpline(distances, seriesData[u]);
      const cum = BREAKS_M.map(m => Math.min(100, Math.max(0, evalSpline(spl, m))));
      // cum[2] lands exactly on the 20-min data point (1609.344 m = distances[6])
      buckets[u] = [
        cum[0],
        cum[1] - cum[0],
        cum[2] - cum[1],
        100 - cum[2],
      ].map(v => +Math.max(0, v).toFixed(1));
    });

    // ---- layout ----
    const W = 800, H = 460;
    const M = { top: 30, right: 30, bottom: 56, left: 60 };
    const innerW = W - M.left - M.right;
    const innerH = H - M.top - M.bottom;

    const barW  = 100;
    const totalBarW = UTILS.length * barW;
    const gapW  = (innerW - totalBarW) / (UTILS.length + 1);

    const yScale = p => M.top + (1 - p / 100) * innerH;

    const chart = document.getElementById("chart");
    const tip   = document.getElementById("tip");

    function el(tag, attrs, text) {
      const e = document.createElementNS(SVG_NS, tag);
      for (const k in attrs) e.setAttribute(k, attrs[k]);
      if (text != null) e.textContent = text;
      return e;
    }

    // 1) Gridlines + y-axis labels
    [0, 25, 50, 75, 100].forEach(p => {
      chart.appendChild(el("line", {
        x1: M.left, y1: yScale(p), x2: M.left + innerW, y2: yScale(p),
        stroke: "rgba(255,255,255,0.08)", "stroke-width": 1
      }));
      chart.appendChild(el("text", {
        x: M.left - 10, y: yScale(p),
        fill: "rgba(255,255,255,0.65)", "font-size": 11,
        "text-anchor": "end", "dominant-baseline": "middle"
      }, p + "%"));
    });

    // 2) Axes
    chart.appendChild(el("line", {
      x1: M.left, y1: M.top, x2: M.left, y2: M.top + innerH,
      stroke: "rgba(255,255,255,0.22)", "stroke-width": 1
    }));
    chart.appendChild(el("line", {
      x1: M.left, y1: M.top + innerH, x2: M.left + innerW, y2: M.top + innerH,
      stroke: "rgba(255,255,255,0.22)", "stroke-width": 1
    }));

    // 3) Bars — stacked bottom-up: darkest (closest) at the base
    UTILS.forEach((u, i) => {
      const barX = M.left + gapW + i * (barW + gapW);
      let yBottom = M.top + innerH;

      buckets[u].forEach((pct, bi) => {
        if (pct <= 0) return;
        const rectH = (pct / 100) * innerH;
        const rectY = yBottom - rectH;
        yBottom = rectY;

        const rect = el("rect", {
          x: barX, y: rectY, width: barW, height: rectH,
          fill: BUCKET_COLORS[bi], style: "cursor:default"
        });
        rect.addEventListener("mousemove", e => {
          tip.innerHTML =
            `<span style="color:${BUCKET_COLORS[bi]};font-weight:700;` +
            `text-shadow:0 0 6px rgba(255,255,255,0.3)">${BUCKET_LABELS[bi]}</span>` +
            `<br><span style="font-size:14px;font-weight:700;color:#fff">${pct}%</span>` +
            `<span style="color:rgba(255,255,255,0.45);font-size:10px">&nbsp;of ${u} reports</span>`;
          tip.style.left    = e.clientX + "px";
          tip.style.top     = e.clientY + "px";
          tip.style.opacity = "1";
        });
        rect.addEventListener("mouseleave", () => { tip.style.opacity = "0"; });
        chart.appendChild(rect);

        // Percentage label inside segment (skip if too thin)
        if (rectH >= 18) {
          chart.appendChild(el("text", {
            x: barX + barW / 2, y: rectY + rectH / 2,
            fill: BUCKET_TEXT[bi], "font-size": 12, "font-weight": 500,
            "text-anchor": "middle", "dominant-baseline": "middle"
          }, pct + "%"));
        }
      });

      // X-axis label
      chart.appendChild(el("text", {
        x: barX + barW / 2, y: M.top + innerH + 22,
        fill: "rgba(255,255,255,0.88)", "font-size": 13, "font-weight": 600,
        "text-anchor": "middle"
      }, u));
    });

    // 4) Y-axis title
    const ytx = 16, yty = M.top + innerH / 2;
    chart.appendChild(el("text", {
      x: ytx, y: yty, fill: "rgba(255,255,255,0.65)", "font-size": 12,
      "text-anchor": "middle", transform: `rotate(-90,${ytx},${yty})`
    }, "% of encampment reports"));

    // 5) Legend (right-aligned, matching heatmap style)
    const legendEl = document.getElementById("legend");
    BUCKET_LABELS.forEach((label, i) => {
      const key  = document.createElement("span");
      key.className = "key";
      const swatch = document.createElement("i");
      swatch.style.background = BUCKET_COLORS[i];
      const span = document.createElement("span");
      span.textContent = label;
      key.append(swatch, span);
      legendEl.appendChild(key);
    });
  </script>
</body>
</html>
